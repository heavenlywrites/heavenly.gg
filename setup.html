<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #ffb8d4; --pink-light: #ffe4f0; --pink-border: #f5b8d0;
  --purple-dark: #4a3560; --purple-soft: #ddd6ff; --purple-border: rgba(210,190,240,.4);
  --text-muted: #b09cc0; --bg: #fdf6ff; --card-bg: #fff; --shadow: rgba(180,150,220,.14);
}
body { min-height:100vh; font-family:'Nunito',sans-serif; background:var(--bg); color:var(--purple-dark); overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 55% 45% at 15% 10%, #ffd6f0 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 5%, #ddd6ff 0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at 50% 95%, #d6eeff 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%, #ffecd6 0%, transparent 60%);
}
.wrap { position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:40px 24px 80px; }

/* HEADER */
.header { display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:44px; text-align:center; }
.back-link { align-self:flex-start; font-size:.72rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); text-decoration:none; display:flex; align-items:center; gap:6px; margin-bottom:16px; transition:color .15s; }
.back-link:hover { color:var(--purple-dark); }
.back-link svg { width:14px; height:14px; }
.header-title { font-family:'Pacifico',cursive; font-size:2rem; color:var(--purple-dark); }
.header-sub { font-size:.72rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--pink); }
.header-desc { font-size:.82rem; color:var(--text-muted); font-weight:600; max-width:380px; line-height:1.7; margin-top:4px; }

/* TABS */
.tabs { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:36px; }
.tab { padding:6px 16px; border-radius:50px; font-family:'Nunito',sans-serif; font-size:.7rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; border:1.5px solid var(--purple-border); background:var(--card-bg); color:var(--text-muted); transition:all .18s cubic-bezier(.22,1,.36,1); }
.tab:hover { color:var(--purple-dark); border-color:var(--pink-border); }
.tab.active { background:var(--pink-light); border-color:var(--pink-border); color:var(--purple-dark); box-shadow:0 4px 14px rgba(255,180,210,.25); }

/* GRID */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(270px,1fr)); gap:22px; }
.card { background:var(--card-bg); border:1.5px solid var(--purple-border); border-radius:24px; overflow:hidden; box-shadow:0 4px 20px var(--shadow); cursor:pointer; text-decoration:none; color:inherit; display:flex; flex-direction:column; transition:transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s, border-color .2s; position:relative; }
.card:hover { transform:translateY(-5px) scale(1.01); box-shadow:0 12px 36px rgba(200,150,220,.2); border-color:var(--pink-border); }
.card-img-wrap { background:var(--pink-light); display:flex; align-items:center; justify-content:center; height:200px; overflow:hidden; position:relative; }
.card-img-wrap img { max-width:80%; max-height:80%; object-fit:contain; transition:transform .3s cubic-bezier(.22,1,.36,1); }
.card:hover .card-img-wrap img { transform:scale(1.07); }
.card-img-placeholder { display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--pink); font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; }
.card-img-placeholder svg { width:36px; height:36px; opacity:.4; }
.card-tag { position:absolute; top:12px; left:12px; padding:3px 10px; border-radius:50px; background:rgba(255,255,255,.88); font-size:.62rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--purple-dark); border:1px solid var(--purple-border); backdrop-filter:blur(4px); }
.card-qty { position:absolute; top:12px; right:12px; padding:3px 10px; border-radius:50px; background:rgba(255,184,212,.85); font-size:.62rem; font-weight:800; letter-spacing:.08em; color:var(--purple-dark); border:1px solid var(--pink-border); backdrop-filter:blur(4px); }
.card-body { padding:16px 18px 18px; display:flex; flex-direction:column; gap:5px; flex:1; }
.card-name { font-family:'Hachi Maru Pop',cursive; font-size:.92rem; line-height:1.45; color:var(--purple-dark); }
.card-desc { font-size:.73rem; font-weight:600; color:var(--text-muted); line-height:1.65; flex:1; }
.card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid rgba(210,190,240,.3); }
.card-price { font-size:.78rem; font-weight:800; color:var(--purple-dark); }
.card-link-icon { width:28px; height:28px; border-radius:50%; background:var(--pink-light); border:1.5px solid var(--pink-border); display:flex; align-items:center; justify-content:center; }
.card-link-icon svg { width:13px; height:13px; color:var(--pink); }

/* DELETE */
.card-del { position:absolute; top:48px; right:12px; width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,.9); border:1.5px solid var(--pink-border); display:none; align-items:center; justify-content:center; cursor:pointer; z-index:5; color:#e8a0bc; transition:all .15s; }
.card-del:hover { background:var(--pink-light); color:var(--purple-dark); }
.card-del svg { width:12px; height:12px; }
body.edit-mode .card-del { display:flex; }
body.edit-mode .card { cursor:default; }

/* ADD BUTTON */

/* OVERLAY & MODAL */
.overlay { position:fixed; inset:0; background:rgba(200,170,230,.3); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
.overlay.open { opacity:1; pointer-events:all; }
.modal { background:#fff8fe; border:1.5px solid rgba(210,190,240,.5); border-radius:28px; padding:28px 32px 24px; max-width:460px; width:100%; box-shadow:0 12px 48px rgba(200,150,220,.22); transform:translateY(16px); transition:transform .22s cubic-bezier(.22,1,.36,1); max-height:90vh; overflow-y:auto; }
.overlay.open .modal { transform:translateY(0); }
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.modal-title { font-family:'Hachi Maru Pop',cursive; font-size:1.2rem; color:var(--purple-dark); }
.modal-x { width:30px; height:30px; border-radius:50%; border:1.5px solid var(--purple-border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:all .15s; }
.modal-x:hover { border-color:var(--pink-border); color:var(--purple-dark); }
.modal-x svg { width:14px; height:14px; }
.field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.field label { font-size:.7rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); }
.field input, .field textarea, .field select { width:100%; padding:10px 14px; border-radius:14px; border:1.5px solid var(--purple-border); background:#fff; font-family:'Nunito',sans-serif; font-size:.82rem; font-weight:600; color:var(--purple-dark); outline:none; transition:border-color .15s, box-shadow .15s; resize:none; }
.field input:focus, .field textarea:focus, .field select:focus { border-color:var(--pink-border); box-shadow:0 0 0 3px rgba(255,184,212,.18); }
.field textarea { height:72px; line-height:1.6; }
.field select { cursor:pointer; }
.field input::placeholder, .field textarea::placeholder { color:#d0bce0; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }
.btn-cancel { padding:8px 20px; border-radius:50px; border:1.5px solid var(--purple-border); background:transparent; font-family:'Nunito',sans-serif; font-weight:800; font-size:.74rem; color:var(--text-muted); cursor:pointer; transition:all .15s; }
.btn-cancel:hover { border-color:var(--pink-border); color:var(--purple-dark); }
.btn-primary { padding:8px 22px; border-radius:50px; border:1.5px solid var(--pink-border); background:var(--pink-light); font-family:'Nunito',sans-serif; font-weight:800; font-size:.74rem; color:var(--purple-dark); cursor:pointer; box-shadow:0 4px 16px rgba(255,180,210,.2); transition:all .15s; display:flex; align-items:center; gap:6px; }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(255,180,210,.3); }
.btn-primary:disabled { opacity:.55; cursor:not-allowed; transform:none; }
.loading-bar { display:none; align-items:center; gap:10px; padding:10px 14px; border-radius:14px; background:var(--purple-soft); font-size:.76rem; font-weight:700; color:var(--purple-dark); margin-top:4px; }
.loading-bar.show { display:flex; }
.spinner { width:16px; height:16px; border:2.5px solid rgba(180,150,220,.3); border-top-color:var(--pink); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }
.error-msg { font-size:.74rem; font-weight:700; color:#e8a0bc; margin-top:4px; display:none; }
.error-msg.show { display:block; }
.api-notice { background:var(--pink-light); border:1.5px solid var(--pink-border); border-radius:16px; padding:10px 14px; font-size:.74rem; font-weight:700; color:var(--purple-dark); line-height:1.6; margin-bottom:12px; }
.api-notice a { color:var(--pink); text-decoration:none; }
.api-notice a:hover { text-decoration:underline; }
.empty { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; gap:10px; padding:60px 20px; color:var(--text-muted); text-align:center; }
.empty svg { width:52px; height:52px; opacity:.3; }
.empty-title { font-family:'Hachi Maru Pop',cursive; font-size:1.1rem; color:var(--purple-dark); }
.empty-sub { font-size:.78rem; font-weight:600; max-width:280px; line-height:1.7; }
@media (max-width:600px) {
  .header-title { font-size:1.6rem; }
  .grid { grid-template-columns:1fr 1fr; gap:14px; }
  .modal { padding:20px 18px 18px; }
  .add-btn span { display:none; }
  .add-btn { padding:12px 14px; }
}
@media (max-width:420px) { .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <a href="https://heavenly.gg" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      back to heavenly.gg
    </a>
    <div class="header-title">most asked for items ♡</div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" onclick="filterTab(this,'all')">all</button>
    <button class="tab" onclick="filterTab(this,'display')">display</button>
    <button class="tab" onclick="filterTab(this,'audio')">audio</button>
    <button class="tab" onclick="filterTab(this,'peripherals')">peripherals</button>
    <button class="tab" onclick="filterTab(this,'computing')">computing</button>
    <button class="tab" onclick="filterTab(this,'accessories')">accessories</button>
  </div>
  <div class="grid" id="grid"></div>
</div>


<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">add to my setup</div>
      <button class="modal-x" onclick="closeAdd()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="api-notice" id="apiNotice">🔑 <strong>First time?</strong> Enter your <a href="https://console.anthropic.com/settings/keys" target="_blank">Anthropic API key</a> below — saved in your browser, used to auto-fill info from Amazon links.</div>
    <div class="field" id="apiKeyField">
      <label>Anthropic API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..."/>
    </div>
    <div class="field">
      <label>Amazon Link</label>
      <input type="url" id="amazonUrl" placeholder="https://www.amazon.com/dp/..."/>
    </div>
    <div class="loading-bar" id="loadingBar"><div class="spinner"></div><span id="loadingText">Looking up product...</span></div>
    <div class="error-msg" id="errorMsg"></div>
    <div id="manualFields" style="display:none">
      <div class="field"><label>Product Name</label><input type="text" id="pName" placeholder="e.g. Pixio PX278 Wave Pink"/></div>
      <div class="field"><label>Description</label><textarea id="pDesc" placeholder="Brief description..."></textarea></div>
      <div class="field"><label>Price</label><input type="text" id="pPrice" placeholder="$99.99"/></div>
      <div class="field"><label>Image URL</label><input type="url" id="pImg" placeholder="https://..."/></div>
      <div class="field"><label>Quantity label (optional)</label><input type="text" id="pQty" placeholder="e.g. x3"/></div>
      <div class="field"><label>Category</label>
        <select id="pCat">
          <option value="display">display</option>
          <option value="audio">audio</option>
          <option value="peripherals">peripherals</option>
          <option value="computing">computing</option>
          <option value="accessories">accessories</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAdd()">cancel</button>
      <button class="btn-primary" id="fetchBtn" onclick="handleFetch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="13" height="13"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        fetch info
      </button>
      <button class="btn-primary" id="saveBtn" onclick="saveItem()" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="13" height="13"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        save
      </button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'heavenly_setup_v4';
const API_KEY_STORAGE = 'heavenly_api_key';

const DEFAULT_ITEMS = [
  {

    description:'A 75% wireless mechanical keyboard with a stunning sakura pink aluminum alloy exoskeleton. Hot-swappable Kailh linear switches, 8000mAh battery, dual RGB zones, and tri-mode connectivity — beautiful and tournament-ready.',
    price:'', qty:'', category:'peripherals',

    url:'https://www.amazon.com/GravaStar-K1-Wireless-Exoskeleton-Mechanical/dp/B0DZCKGDYZ'
  },
  {
    id:'7', name:'White Tempered Glass Mouse Pad',
    description:'A large white tempered glass hard mouse pad with an ultra-smooth micro-etched surface for lightning-fast, precise mouse control. Water-resistant, scratch-proof, and easy to clean — the perfect sleek addition to any setup.',
    price:'', qty:'', category:'peripherals',

    url:'https://www.amazon.com/gp/product/B0FZRD7ZHC/'
  },
  {
    id:'8', name:'Sony INZONE H9 II Wireless Gaming Headset',
    description:'Sony\u2019s premium wireless gaming headset built with the same drivers as the acclaimed WH-1000XM6, with active noise cancellation, a detachable cardioid AI mic, and 360 Spatial Sound tuned to your ear shape. Ultra-low latency 2.4GHz + Bluetooth, 5-min quick charge, in sleek white.',
    price:'', qty:'', category:'audio',
    image:'https://m.media-amazon.com/images/I/61CGHv6kmWL._AC_SL1500_.jpg',
    url:'https://www.amazon.com/Sony-Canceling-WH-1000XM6-Lightweight-Detachable/dp/B0FJ2YPTSQ'
  },
  {
    id:'9', name:'Orange Factory Criss Cross Chair',
    description:'A super comfy armless criss-cross chair in white teddy fleece, designed for sitting cross-legged at your desk. Wide padded seat, 360\u00b0 swivel, height adjustable, and BIFMA certified — cute, cozy, and practical.',
    price:'', qty:'', category:'accessories',
    image:'https://m.media-amazon.com/images/I/71aM5eTMhZL._AC_SL1500_.jpg',
    url:'https://www.amazon.com/Orange-Factory-Armless-Adjustable-Computer/dp/B0GS3PGDCC/'
  }
];

const STORAGE_FALLBACK_KEY = 'heavenly_setup_initialized';
let items;
const stored = localStorage.getItem(STORAGE_KEY);
if (stored) {
  items = JSON.parse(stored);
} else {
  items = [...DEFAULT_ITEMS];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

let currentTab = 'all';
let currentUrl = '';

function render() {
  const grid = document.getElementById('grid');
  const filtered = currentTab === 'all' ? items : items.filter(i => i.category === currentTab);
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <div class="empty-title">nothing here yet!</div>
      <div class="empty-sub">${currentTab==='all'?'tap + to add your first item \u2665':'no '+currentTab+' items yet!'}</div>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(item => `
    <a class="card" href="${item.url}" target="_blank" rel="noopener" onclick="cardClick(event)" data-id="${item.id}">
      <div class="card-img-wrap">
        ${item.image ? `<img referrerpolicy="no-referrer" src="${item.image}" alt="${esc(item.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div class="card-img-placeholder" ${item.image?'style="display:none"':''}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          no image
        </div>
        <div class="card-tag">${item.category}</div>
        ${item.qty ? `<div class="card-qty">${esc(item.qty)}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-name">${esc(item.name)}</div>
        <div class="card-desc">${esc(item.description)}</div>
        <div class="card-footer">
          <div class="card-price">${item.price||''}</div>
          <div class="card-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </div>
        </div>
      </div>
      <button class="card-del" onclick="delItem(event,'${item.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </a>`).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function cardClick(e){
  if(document.body.classList.contains('edit-mode')) e.preventDefault();
}

function filterTab(el,cat){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); currentTab=cat; render();
}


function delItem(e,id){
  e.preventDefault(); e.stopPropagation();
  items=items.filter(i=>i.id!==id); save(); render();
}

function openAdd(){
  document.getElementById('addOverlay').classList.add('open');
  loadApiKeyUI();
  document.getElementById('amazonUrl').value='';
  document.getElementById('manualFields').style.display='none';
  document.getElementById('saveBtn').style.display='none';
  document.getElementById('fetchBtn').style.display='flex';
  hideError(); hideLoading();
}

function closeAdd(){ document.getElementById('addOverlay').classList.remove('open'); }
document.getElementById('addOverlay').addEventListener('click',function(e){ if(e.target===this) closeAdd(); });

function loadApiKeyUI(){
  const stored=localStorage.getItem(API_KEY_STORAGE)||'';
  document.getElementById('apiKeyInput').value=stored;
  if(stored){ document.getElementById('apiNotice').style.display='none'; document.getElementById('apiKeyField').style.display='none'; }
  else { document.getElementById('apiNotice').style.display='block'; document.getElementById('apiKeyField').style.display='flex'; }
}

function getApiKey(){
  const v=document.getElementById('apiKeyInput').value.trim();
  if(v) localStorage.setItem(API_KEY_STORAGE,v);
  return v||localStorage.getItem(API_KEY_STORAGE)||'';
}

async function handleFetch(){
  hideError();
  const url=document.getElementById('amazonUrl').value.trim();
  if(!url){showError('please paste an Amazon link!');return;}
  const apiKey=getApiKey();
  if(!apiKey){showError('please enter your Anthropic API key first!');return;}
  currentUrl=url;
  showLoading('fetching product info...');
  document.getElementById('fetchBtn').disabled=true;
  try {
    const result=await fetchProductInfo(url,apiKey);
    hideLoading(); document.getElementById('fetchBtn').disabled=false;
    document.getElementById('pName').value=result.title||'';
    document.getElementById('pDesc').value=result.description||'';
    document.getElementById('pPrice').value=result.price||'';
    document.getElementById('pImg').value=result.imageUrl||'';
    document.getElementById('pQty').value='';
    const c=document.getElementById('pCat');
    const valid=['display','audio','peripherals','computing','accessories'];
    c.value=valid.includes(result.category)?result.category:'accessories';
    document.getElementById('manualFields').style.display='block';
    document.getElementById('saveBtn').style.display='flex';
    document.getElementById('fetchBtn').style.display='none';
    hideError();
  } catch(err){
    hideLoading(); document.getElementById('fetchBtn').disabled=false;
    showError("couldn\u2019t fetch \u2014 fill it in manually below!");
    document.getElementById('manualFields').style.display='block';
    document.getElementById('saveBtn').style.display='flex';
    document.getElementById('fetchBtn').style.display='none';
  }
}

async function fetchProductInfo(url,apiKey){
  const sys=`You extract Amazon product info for a PC setup showcase. Given a URL, use web search to find the product and return ONLY a valid JSON object: {title,description,imageUrl,price,category}. title: short brand+model (max 60 chars). description: 2 sentences. imageUrl: direct Amazon CDN image URL. price: with $ sign or empty. category: one of display|audio|peripherals|computing|accessories. ONLY JSON, no markdown.`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-beta':'interleaved-thinking-2025-05-14'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,thinking:{type:'enabled',budget_tokens:500},tools:[{type:'web_search_20250305',name:'web_search'}],system:sys,messages:[{role:'user',content:`Extract product info: ${url}`}]})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'API error');}
  const data=await res.json();
  const tb=data.content.find(b=>b.type==='text');
  if(!tb) throw new Error('no response');
  let t=tb.text.trim().replace(/^```json\s*/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  return JSON.parse(t);
}

function saveItem(){
  const name=document.getElementById('pName').value.trim();
  if(!name){showError('product name is required!');return;}
  items.push({id:Date.now().toString(),name,description:document.getElementById('pDesc').value.trim(),price:document.getElementById('pPrice').value.trim(),image:document.getElementById('pImg').value.trim(),qty:document.getElementById('pQty').value.trim(),category:document.getElementById('pCat').value,url:currentUrl});
  save(); render(); closeAdd();
}

function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(items)); }
function showLoading(m){ document.getElementById('loadingBar').classList.add('show'); document.getElementById('loadingText').textContent=m; }
function hideLoading(){ document.getElementById('loadingBar').classList.remove('show'); }
function showError(m){ const e=document.getElementById('errorMsg'); e.textContent=m; e.classList.add('show'); }
function hideError(){ document.getElementById('errorMsg').classList.remove('show'); }

render();
</script>
</body>
</html>
