<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heavenly</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Hachi+Maru+Pop&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    position: relative;
    overflow: hidden;
  }



  .avatar-wrap { position: relative; z-index: 1; }

  .avatar {
    width: 82px;
    height: 82px;
    border-radius: 50%;
    background: #2e2e32;
    box-shadow: 0 6px 24px rgba(0,0,0,.25), 0 0 6px rgba(227,242,237,.25), 0 0 12px rgba(227,242,237,.15);
    overflow: hidden;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .badge {
    position: absolute;
    bottom: 0px;
    right: 0px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #e3f2ed;
    border: 3px solid #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(227,242,237,.25);
  }

  .name {
    position: relative;
    z-index: 1;
    font-family: 'Hachi Maru Pop', cursive;
    font-size: 1.4rem;
    color: #ffffff;
    text-shadow: 0 0 8px rgba(255,255,255,.75), 0 0 20px rgba(255,255,255,.4);
    margin-top: -14px;
  }

  .role {
    position: relative;
    z-index: 1;
    font-size: .66rem;
    font-weight: 600;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: rgba(227,242,237,.65);
    text-shadow: 0 0 6px rgba(227,242,237,.45), 0 0 14px rgba(227,242,237,.25);
    margin-top: -16px;
  }

  .links-row {
    position: relative;
    z-index: 1;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    font-family: "Nunito", sans-serif;
    font-weight: 800;
    font-size: .58rem;
  }

  .links-row a {
    color: #e3f2ed;
    text-decoration: none;
    text-shadow: 0 0 6px rgba(227,242,237,.5), 0 0 14px rgba(227,242,237,.3);
    transition: text-shadow .15s, opacity .15s;
  }
  .links-row a:hover {
    text-shadow: 0 0 8px rgba(227,242,237,.75), 0 0 18px rgba(227,242,237,.5);
    opacity: .85;
  }

  .links-sep {
    color: rgba(227,242,237,.4);
  }

  .discord-card {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #000000;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 18px;
    padding: 8px 10px 8px 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.45);
    animation: discord-pulse 2.4s ease-in-out infinite;
  }

  #gate-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    transition: opacity .6s ease;
    opacity: 1;
  }

  .pixel-cursor {
    position: fixed;
    top: 0;
    left: 0;
    width: 16px;
    height: 16px;
    pointer-events: none;
    z-index: 10001;
    display: none;
  }

  .pixel-star {
    position: fixed;
    width: 9px;
    height: 9px;
    background: #ffffff;
    clip-path: polygon(40% 0%, 60% 0%, 60% 40%, 100% 40%, 100% 60%, 60% 60%, 60% 100%, 40% 100%, 40% 60%, 0% 60%, 0% 40%, 40% 40%);
    pointer-events: none;
    z-index: 10000;
    filter: drop-shadow(0 0 4px rgba(255,255,255,.8));
    transform: translate(-50%,-50%);
    animation: pixel-star-fade .6s ease-out forwards;
  }

  @keyframes pixel-star-fade {
    0% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(.3) translateY(-8px); }
  }

  #gate-text {
    font-family: 'Press Start 2P', monospace;
    color: #ffb3d9;
    font-size: 1.1rem;
    text-align: center;
    padding: 0 20px;
    text-shadow: 0 0 10px rgba(255,179,217,1), 0 0 22px rgba(255,179,217,.65), 0 0 38px rgba(255,179,217,.4);
    animation: gate-pulse 1.6s ease-in-out infinite;
  }

  @keyframes gate-pulse {
    0%, 100% { opacity: .7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  @keyframes discord-pulse {
    0%, 100% { box-shadow: 0 8px 24px rgba(0,0,0,.45), 0 0 0 rgba(255,255,255,0); transform: scale(1); }
    50% { box-shadow: 0 8px 24px rgba(0,0,0,.45), 0 0 9px rgba(255,255,255,.25); transform: scale(1.03); }
  }

  .discord-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: #242427;
  }

  .discord-info {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .discord-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: .78rem;
    color: #f2f2f3;
    text-shadow: 0 0 6px rgba(255,255,255,.5), 0 0 14px rgba(255,255,255,.3);
  }

  .discord-stats {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: .62rem;
    font-weight: 700;
    color: #9a9a9e;
    text-shadow: 0 0 6px rgba(255,255,255,.25);
  }

  .dc-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #6a6a6e;
    display: inline-block;
  }
  .dc-dot.online { background: #3ba55d; }

  .discord-join {
    margin-left: 4px;
    padding: 7px 15px;
    border-radius: 13px;
    background: #2a2a2e;
    border: 1px solid rgba(255,255,255,.08);
    color: #f2f2f3;
    text-shadow: 0 0 6px rgba(255,255,255,.5), 0 0 14px rgba(255,255,255,.3);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: .68rem;
    text-decoration: none;
    transition: transform .15s, background .15s;
  }
  .discord-join:hover { transform: translateY(-2px); background: #34343a; }

  .icons {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: nowrap;
    justify-content: center;
    gap: 12px;
  }

  .icon-btn {
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: transform .18s cubic-bezier(.22,1,.36,1);
  }

  .icon-btn svg {
    filter: drop-shadow(0 0 4px rgba(255,255,255,.55)) drop-shadow(0 0 9px rgba(255,255,255,.35));
  }

  .icon-btn:hover { transform: translateY(-4px) scale(1.08); }
  .icon-btn:hover svg {
    filter: drop-shadow(0 0 6px rgba(255,255,255,.75)) drop-shadow(0 0 14px rgba(255,255,255,.5));
  }

  .footer {
    position: relative;
    z-index: 1;
    font-size: .6rem;
    color: #9a9a9e;
    font-weight: 600;
    letter-spacing: .1em;
    margin-top: -8px;
    margin-bottom: -16px;
  }
</style>

  <script>
    (function () {
      // ---- Discord widget config — put your real invite code here ----
      // the part after discord.gg/  (e.g. for discord.gg/abc123 it's "abc123")
      var INVITE_CODE = 'opp';

      var iconEl = document.getElementById('dc-icon');
      var nameEl = document.getElementById('dc-name');
      var onlineEl = document.getElementById('dc-online');
      var membersEl = document.getElementById('dc-members');
      var joinEl = document.getElementById('dc-join');

      joinEl.href = 'https://discord.gg/' + INVITE_CODE;

      // The invite lookup returns the server's name, icon, and live member/online
      // counts all in one call — exactly what shows in a Discord invite preview.
      fetch('https://discord.com/api/v10/invites/' + INVITE_CODE + '?with_counts=true')
        .then(function (r) { if (!r.ok) throw new Error('invite lookup failed'); return r.json(); })
        .then(function (data) {
          if (data.guild) {
            if (data.guild.name) nameEl.textContent = data.guild.name;
            if (data.guild.icon) {
              iconEl.src = 'https://cdn.discordapp.com/icons/' + data.guild.id + '/' + data.guild.icon + '.png?size=128';
            }
          }
          if (typeof data.approximate_presence_count === 'number') {
            onlineEl.textContent = data.approximate_presence_count.toLocaleString() + ' online';
          }
          if (typeof data.approximate_member_count === 'number') {
            membersEl.textContent = data.approximate_member_count.toLocaleString() + ' members';
          }
        })
        .catch(function () {
          // Couldn't resolve the invite — double check INVITE_CODE above matches
          // your real discord.gg link exactly.
        });
    })();
  </script>

  <script>
    (function () {
      var canvas = document.getElementById('stars-bg');
      var ctx = canvas.getContext('2d');
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var W, H;

      function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      window.addEventListener('resize', resize);
      resize();

      // ---- a few twinkling stars, spread evenly across the screen ----
      var STAR_COUNT = 80;
      var stars = [];
      var aspect = W / H;
      var rows = Math.max(1, Math.round(Math.sqrt(STAR_COUNT / aspect)));
      var cols = Math.max(1, Math.round(STAR_COUNT / rows));
      var cellW = W / cols;
      var cellH = H / rows;
      for (var row = 0; row < rows; row++) {
        for (var col = 0; col < cols; col++) {
          stars.push({
            x: col * cellW + Math.random() * cellW,
            y: row * cellH + Math.random() * cellH,
            r: Math.random() * 1.3 + .3,
            baseAlpha: Math.random() * .6 + .25,
            tw: Math.random() * Math.PI * 2,
            twSpeed: Math.random() * .025 + .006
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        for (var i = 0; i < stars.length; i++) {
          var s = stars[i];
          s.tw += s.twSpeed;
          var alpha = s.baseAlpha * (.6 + .4 * Math.sin(s.tw));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(3) + ')';
          ctx.fill();
        }

        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>

  <script>
    (function () {
      var gate = document.getElementById('gate-screen');
      var cursorEl = document.getElementById('pixel-cursor');
      var audio = document.getElementById('site-audio');
      var lastSpawn = 0;
      var active = true;

      // Start fetching/buffering the audio right away so it's ready
      // to play instantly once the gate is clicked, instead of waiting
      // for the click to trigger the first download.
      audio.load();

      function spawnStar(x, y) {
        var star = document.createElement('div');
        star.className = 'pixel-star';
        star.style.left = x + 'px';
        star.style.top = y + 'px';
        document.body.appendChild(star);
        setTimeout(function () { star.remove(); }, 600);
      }

      function onMove(e) {
        if (!active) return;
        cursorEl.style.display = 'block';
        cursorEl.style.left = e.clientX + 'px';
        cursorEl.style.top = e.clientY + 'px';
        var now = Date.now();
        if (now - lastSpawn > 45) {
          lastSpawn = now;
          spawnStar(e.clientX, e.clientY);
        }
      }
      document.addEventListener('mousemove', onMove);

      function typeWriter() {
        var el = document.querySelector('.name');
        var text = 'heavenly';
        el.textContent = '';
        var i = 0;
        function step() {
          el.textContent = text.slice(0, i);
          i++;
          if (i <= text.length) {
            setTimeout(step, 190);
          }
        }
        step();
      }

      function enter() {
        active = false;
        cursorEl.style.display = 'none';
        gate.style.opacity = '0';
        gate.style.pointerEvents = 'none';
        setTimeout(function () { gate.style.display = 'none'; }, 600);
        typeWriter();

        audio.volume = 0.2;
        audio.play().catch(function (err) {
          // Some browsers may still block playback even after a click.
          // Check the browser console (F12) for the actual reason if this fires.
          console.error('audio playback failed:', err);
        });
      }
      gate.addEventListener('click', enter);
      gate.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          enter();
        }
      });
    })();
  </script>
